<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071b2d" />
  <title>PRO Рыбалка</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar glass">
      <div>
        <p class="eyebrow">Telegram Mini App • Browser</p>
        <h1>🎣 PRO Рыбалка</h1>
      </div>
      <div class="header-actions">
        <button id="motionBtn" class="icon-btn motion-btn" aria-label="Уменьшить анимации" title="Уменьшить анимации">✨</button>
        <button id="guideBtn" class="icon-btn" aria-label="Открыть справочник">📘</button>
      </div>
    </header>

    <section class="status-grid sticky-status">
      <article class="status-card glass">
        <span>Погода</span>
        <strong id="weatherLabel">—</strong>
      </article>
      <article class="status-card glass">
        <span>Забросы</span>
        <strong id="castsLabel">10</strong>
      </article>
      <article class="status-card glass">
        <span>Вес сейчас</span>
        <strong id="weightLabel">0,0 кг</strong>
      </article>
    </section>

    <section id="lakeCard" class="lake-card glass">
      <div class="ambient-layer" aria-hidden="true">
        <span class="bubble bubble-1"></span><span class="bubble bubble-2"></span><span class="bubble bubble-3"></span>
        <span class="fish-shadow fish-shadow-1">◆</span><span class="fish-shadow fish-shadow-2">◆</span>
      </div>
      <div id="castArc" class="cast-arc" aria-hidden="true"></div>
      <div id="splash" class="splash" aria-hidden="true">💦</div>
      <div id="weatherScene" class="weather-scene" aria-hidden="true">☀️</div>
      <div>
        <h2 id="weatherTitle">Солнечно</h2>
        <p id="weatherDescription">Высока вероятность встретить чайку.</p>
      </div>
    </section>

    <section class="actions cast-panel">
      <button id="castBtn" class="primary-btn">🎣 Забросить удочку</button>
      <button id="restartBtn" class="secondary-btn">↻ Новая игра</button>
    </section>

    <section class="inventory glass">
      <div class="section-heading">
        <h2>Активные эффекты</h2>
        <span id="effectCount">0</span>
      </div>
      <div id="effectsList" class="chips"><span class="muted">Пока нет</span></div>
    </section>

    <section class="history glass">
      <div class="section-heading">
        <h2>Хронология улова</h2>
        <span id="historyCount">0</span>
      </div>
      <div id="historyScroll" class="history-scroll">
        <ol id="historyList" class="history-list"></ol>
        <div id="emptyHistory" class="empty-state">Первый заброс ждёт вас.</div>
      </div>
      <div id="resultCard" class="result-card hidden"></div>
    </section>
  </main>

  <dialog id="guideDialog" class="modal">
    <div class="modal-card wide">
      <button class="close-btn" data-close="guideDialog" aria-label="Закрыть">×</button>
      <h2>Справочник</h2>
      <nav id="guideTabs" class="tabs"></nav>
      <div id="guideContent" class="guide-content"></div>
    </div>
  </dialog>

  <dialog id="choiceDialog" class="modal">
    <div class="modal-card">
      <h2 id="choiceTitle">Выбор</h2>
      <p id="choiceText"></p>
      <div id="choiceButtons" class="choice-buttons"></div>
    </div>
  </dialog>

  <div id="effectOverlay" class="effect-overlay" aria-hidden="true">
    <div id="effectBackdrop" class="effect-backdrop"></div>
    <div id="effectParticles" class="effect-particles"></div>
    <div id="effectIcon" class="effect-icon"></div>
    <div id="effectTitle" class="effect-title"></div>
    <div id="effectSubtitle" class="effect-subtitle"></div>
  </div>
  <div id="weatherFx" class="weather-fx" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
