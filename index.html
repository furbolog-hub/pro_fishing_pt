<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071b2d" />
  <title>Игровой портал</title>
  <link rel="stylesheet" href="./menu.css?v=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="portal-shell">
    <header class="portal-header glass">
      <div>
        <span class="eyebrow">Telegram Mini App • Browser</span>
        <h1>🎮 Игровой портал</h1>
        <p>Выберите игру</p>
      </div>
    </header>

    <section class="games-grid" aria-label="Список игр">
      <a class="game-card game-card--active glass" href="./dropfish/">
        <span class="game-icon" aria-hidden="true">🎣</span>
        <span class="game-copy">
          <strong>DropFish</strong>
          <small>Аркадная рыбалка с погодой, бонусами, дебафами и артефактами</small>
        </span>
        <span class="play-mark" aria-hidden="true">Доступно →</span>
      </a>

      <div class="game-card game-card--locked glass" aria-disabled="true">
        <span class="game-icon" aria-hidden="true">🔒</span>
        <span class="game-copy">
          <strong>Новая игра</strong>
          <small>Скоро появится</small>
        </span>
        <span class="locked-mark">Недоступно</span>
      </div>

      <div class="game-card game-card--locked glass" aria-disabled="true">
        <span class="game-icon" aria-hidden="true">🔒</span>
        <span class="game-copy">
          <strong>Новая игра</strong>
          <small>Скоро появится</small>
        </span>
        <span class="locked-mark">Недоступно</span>
      </div>
    </section>

    <footer class="portal-footer">Игры работают в браузере и Telegram Mini App</footer>
  </main>
  <script>
    (() => {
      const app = window.Telegram?.WebApp;
      if (app?.initData || (app?.platform && app.platform !== 'unknown')) {
        app.ready();
        app.expand();
        const bg = app.themeParams?.bg_color;
        if (bg) document.documentElement.style.setProperty('--tg-bg', bg);
      }
    })();
  </script>
</body>
</html>
